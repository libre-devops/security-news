name: Update Microsoft Security News Feed

on:
  schedule:
    # Every 6 hours (UTC)
    - cron: "0 */6 * * *"

  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: microsoft-security-news-feed
  cancel-in-progress: true

jobs:
  fetch-feeds:
    name: Fetch and Publish Feeds
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Fetch Microsoft security feeds
        run: python scripts/fetch_feeds.py

      - name: Commit updated feed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/feeds.json data/feed.xml

          if git diff --staged --quiet; then
            echo "No feed changes detected."
            exit 0
          fi

          git commit -m "🛡️ Update Microsoft security feeds - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push